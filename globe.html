<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>AI Databases OS | 3D Globe</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Orbitron:wght@700;800;900&display=swap" rel="stylesheet"><style>
:root{--bg:#02030a;--line:rgba(111,246,255,.26);--text:#effcff;--muted:#8fa8c2;--cyan:#6ff6ff;--blue:#536dff;--violet:#aa63ff;--pink:#ff43d4;--green:#48ffc2;--amber:#ffd166;--shadow:0 40px 120px rgba(0,0,0,.72)}
*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:#02030a;color:var(--text);font-family:Inter,system-ui,sans-serif;line-height:1.6;overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;z-index:-8;background:radial-gradient(circle at 10% 10%,rgba(111,246,255,.28),transparent 26%),radial-gradient(circle at 86% 8%,rgba(255,67,212,.22),transparent 27%),radial-gradient(circle at 50% 55%,rgba(83,109,255,.20),transparent 42%),linear-gradient(180deg,#02030a,#071426 48%,#02030a)}
body:after{content:"";position:fixed;inset:0;z-index:-7;background-image:linear-gradient(rgba(111,246,255,.14) 1px,transparent 1px),linear-gradient(90deg,rgba(111,246,255,.14) 1px,transparent 1px);background-size:78px 78px;mask-image:linear-gradient(180deg,black,rgba(0,0,0,.3),transparent);animation:gridmove 18s linear infinite}@keyframes gridmove{to{background-position:0 78px,78px 0}}
.wrap{width:min(1280px,calc(100% - 36px));margin:0 auto}.nav{display:flex;justify-content:space-between;align-items:center;padding:22px 0;color:var(--muted);font-size:12px;letter-spacing:.11em;text-transform:uppercase;position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(2,3,10,.95),rgba(2,3,10,.55));backdrop-filter:blur(18px)}.brand{display:flex;gap:12px;align-items:center;color:#fff;font-weight:900}.logo{width:38px;height:38px;border-radius:14px;background:conic-gradient(var(--cyan),var(--blue),var(--pink),var(--cyan));box-shadow:0 0 45px rgba(111,246,255,.65)}
.navlinks{display:flex;gap:8px;flex-wrap:wrap}.navlinks a{border:1px solid var(--line);border-radius:999px;padding:9px 12px;background:rgba(255,255,255,.045);color:#dffcff;text-decoration:none}
h1,h2,h3{font-family:Orbitron,Inter,sans-serif}h1{font-size:clamp(42px,7vw,104px);line-height:.86;letter-spacing:-.08em;margin:22px 0}.grad{background:linear-gradient(90deg,var(--cyan),var(--blue),var(--violet),var(--pink),var(--amber));-webkit-background-clip:text;background-clip:text;color:transparent}.hero{min-height:760px;display:grid;align-items:center;padding:70px 0 90px}.hero-grid{display:grid;grid-template-columns:.95fr 1.05fr;gap:44px;align-items:center}.eyebrow{display:inline-flex;gap:10px;padding:10px 15px;border-radius:999px;border:1px solid rgba(111,246,255,.38);background:rgba(111,246,255,.09);box-shadow:0 0 48px rgba(111,246,255,.28);font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}.hero p,.section-copy{font-size:clamp(17px,2vw,22px);color:#b7c9df;max-width:900px}.cta{display:flex;gap:13px;flex-wrap:wrap;margin-top:28px}.btn{padding:16px 20px;border-radius:16px;text-decoration:none;font-weight:900;border:1px solid var(--line);color:white;background:rgba(255,255,255,.06);cursor:pointer;font-family:Inter}.primary{background:linear-gradient(135deg,var(--cyan),var(--blue),var(--violet));color:#010208;border:0;box-shadow:0 0 44px rgba(111,246,255,.42)}
section{padding:80px 0}.section-title{font-size:clamp(32px,5vw,70px);line-height:.94;letter-spacing:-.065em;margin:0 0 15px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.card,.stage{position:relative;overflow:hidden;border:1px solid var(--line);border-radius:32px;padding:26px;background:linear-gradient(180deg,rgba(255,255,255,.082),rgba(255,255,255,.028));box-shadow:var(--shadow);backdrop-filter:blur(18px)}.card h3{margin:0 0 10px}.card p{color:var(--muted);margin:0}.stage{min-height:560px}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.kpi{border:1px solid rgba(111,246,255,.28);border-radius:24px;padding:18px;background:rgba(255,255,255,.05)}.kpi strong{display:block;font-family:Orbitron;font-size:27px;color:var(--cyan)}.kpi span{font-size:12px;color:var(--muted)}.quote{font-family:Orbitron;font-size:clamp(25px,4vw,50px);line-height:1.15;padding:44px;border-radius:36px;border:1px solid var(--line);background:linear-gradient(135deg,rgba(111,246,255,.14),rgba(83,109,255,.09),rgba(255,67,212,.11));box-shadow:var(--shadow)}footer{padding:60px 0 100px;text-align:center;color:#8296ad;border-top:1px solid rgba(111,246,255,.14)}
@media(max-width:980px){.hero-grid,.grid{grid-template-columns:1fr}.kpis{grid-template-columns:1fr 1fr}.navlinks{display:none}}@media(max-width:560px){.kpis{grid-template-columns:1fr}.btn{width:100%;text-align:center}}

.globe-stage{min-height:680px;display:grid;place-items:center;perspective:1200px}.globe-wrap{position:relative;width:min(520px,78vw);height:min(520px,78vw);transform-style:preserve-3d}.globe{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 28%,rgba(255,255,255,.95),rgba(111,246,255,.30) 9%,transparent 18%),radial-gradient(circle at 50% 50%,rgba(83,109,255,.28),rgba(2,10,30,.95) 63%,#000 100%);border:1px solid rgba(111,246,255,.55);box-shadow:inset -28px -22px 48px rgba(0,0,0,.9),0 0 90px rgba(111,246,255,.45);overflow:hidden;animation:float 5s ease-in-out infinite}@keyframes float{50%{transform:translateY(-16px) scale(1.02)}}.world{position:absolute;inset:-2%;border-radius:50%;background:linear-gradient(90deg,transparent 0 12%,rgba(111,246,255,.52) 13% 15%,transparent 16% 30%,rgba(111,246,255,.34) 31% 36%,transparent 37% 48%,rgba(111,246,255,.45) 49% 52%,transparent 53% 70%,rgba(111,246,255,.35) 71% 75%,transparent 76%);animation:map 12s linear infinite}@keyframes map{from{transform:translateX(-22%)}to{transform:translateX(22%)}}.orbit{position:absolute;left:50%;top:50%;border:1px solid rgba(111,246,255,.36);border-radius:50%;box-shadow:0 0 36px rgba(111,246,255,.2)}.oA{width:620px;height:210px;margin:-105px -310px;animation:oa 10s linear infinite}.oB{width:640px;height:250px;margin:-125px -320px;border-color:rgba(255,67,212,.34);animation:ob 12s linear infinite}@keyframes oa{to{transform:rotateZ(360deg) rotateX(66deg)}}@keyframes ob{to{transform:rotateZ(-360deg) rotateX(74deg)}}.city{position:absolute;width:9px;height:9px;border-radius:50%;background:var(--cyan);box-shadow:0 0 20px var(--cyan)}.c1{left:35%;top:38%}.c2{left:57%;top:35%;background:var(--pink);box-shadow:0 0 20px var(--pink)}.c3{left:48%;top:56%;background:var(--green);box-shadow:0 0 20px var(--green)}
</style></head><body><div class="wrap"><nav class="nav"><div class="brand"><span class="logo"></span> AI Databases OS</div><div class="navlinks"><a href="dashboard.html">Command</a><a href="globe.html">Globe</a><a href="network.html">Network</a><a href="hologram.html">Hologram</a><a href="analytics.html">Analytics</a><a href="jarvis.html">Jarvis</a></div></nav><header class="hero"><div><div class="eyebrow">⟡ Global AI infrastructure visualization</div><h1>GLOBAL <span class="grad">COMPUTE GRID</span>.</h1><p>Moving holographic globe with orbital network pathways and AI infrastructure nodes.</p><div class="cta"><a class="btn" href="dashboard.html">Back to Command Center</a></div></div></header><section><div class="stage globe-stage"><div class="globe-wrap"><div class="orbit oA"></div><div class="orbit oB"></div><div class="globe"><div class="world"></div><span class="city c1"></span><span class="city c2"></span><span class="city c3"></span></div></div></div></section><footer>AI Databases OS • Modular futuristic infrastructure platform</footer></div></body></html>
