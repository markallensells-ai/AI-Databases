<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Allen Capital Ventures // PULSE X</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000000;overflow:hidden;font-family:'Courier New',monospace;}
#c{position:absolute;inset:0;width:100%;height:100%;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#title-wrap{text-align:center;opacity:0;transition:opacity 0.5s;}
#l1,#l2,#l3{display:block;font-weight:bold;letter-spacing:0.15em;opacity:0;transform:translateY(30px);transition:opacity 0.7s,transform 0.7s;}
#l1{font-size:clamp(32px,7vw,90px);color:#ffffff;}
#l2{font-size:clamp(32px,7vw,90px);color:#00e5ff;}
#l3{font-size:clamp(32px,7vw,90px);color:#ffffff;}
#divider{width:0;height:1px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);margin:20px auto;transition:width 1.2s;}
#sub{font-size:clamp(11px,2vw,20px);letter-spacing:0.3em;color:rgba(0,229,255,0.6);opacity:0;transition:opacity 0.8s;}
#sub2{font-size:clamp(9px,1.4vw,14px);letter-spacing:0.2em;color:rgba(176,112,255,0.5);margin-top:8px;opacity:0;transition:opacity 0.8s;}
#enter-btn{position:absolute;bottom:80px;left:50%;transform:translateX(-50%);opacity:0;transition:opacity 0.6s,all 0.3s;background:transparent;border:0.5px solid rgba(0,229,255,0.4);color:#00e5ff;font-family:'Courier New',monospace;font-size:12px;letter-spacing:3px;padding:14px 48px;cursor:pointer;pointer-events:all;}
#enter-btn:hover{background:rgba(0,229,255,0.1);border-color:#00e5ff;box-shadow:0 0 24px rgba(0,229,255,0.2);}
#version{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:rgba(0,229,255,0.2);opacity:0;transition:opacity 0.6s;white-space:nowrap;}
#scanline{position:absolute;left:0;right:0;height:1px;background:rgba(0,229,255,0.06);pointer-events:none;transition:top 0.016s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="title-wrap">
    <span id="l1">ALLEN</span>
    <span id="l2">CAPITAL</span>
    <span id="l3">VENTURES</span>
    <div id="divider"></div>
    <div id="sub">GLOBAL INTELLIGENCE OPERATING SYSTEM</div>
    <div id="sub2">PULSE X // ALLEN OS // v4.0</div>
  </div>
</div>
<button id="enter-btn" onclick="enterSystem()">ENTER SYSTEM</button>
<div id="scanline"></div>
<div id="version">ALLEN CAPITAL VENTURES // PULSE X // CLASSIFIED</div>

<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
let W,H,t=0,rotY=0,scanY=0;
let globeR=0,globePts=[],fieldPts=[],shockwaves=[];
let phase=0; // 0=building, 1=title, 2=ready
let elapsed=0,startT=null,titleShown=false;
let shattering=false,shatterPts=[],shatterT=0;

function resize(){
  W=cv.width=window.innerWidth;
  H=cv.height=window.innerHeight;
  globeR=Math.min(W,H)*0.22;
  buildGlobe();
}
resize();
window.addEventListener('resize',resize);

function buildGlobe(){
  globePts=[];fieldPts=[];
  const lat=16,lon=26;
  for(let i=0;i<=lat;i++){
    const phi=Math.PI*i/lat;
    for(let j=0;j<=lon;j++){
      const theta=Math.PI*2*j/lon;
      globePts.push({
        ox:globeR*Math.sin(phi)*Math.cos(theta),
        oy:globeR*Math.cos(phi),
        oz:globeR*Math.sin(phi)*Math.sin(theta),
        alpha:0,target:Math.random()*0.55+0.25,
        delay:Math.random()*3500,
        sz:Math.random()*1.4+0.4,
        phase:Math.random()*Math.PI*2,
        spd:0.6+Math.random()*0.8,
      });
    }
  }
  for(let i=0;i<250;i++){
    const r=globeR*(0.9+Math.random()*2.0);
    const phi=Math.acos(2*Math.random()-1);
    const theta=Math.random()*Math.PI*2;
    fieldPts.push({
      x:W/2+r*Math.sin(phi)*Math.cos(theta),
      y:H/2+r*Math.cos(phi),
      vx:(Math.random()-0.5)*0.25,
      vy:(Math.random()-0.5)*0.2,
      sz:Math.random()*1.3+0.2,
      alpha:0,target:Math.random()*0.35+0.05,
      delay:Math.random()*4500,
      phase:Math.random()*Math.PI*2,
    });
  }
}

function proj(x,y,z){
  const cy=Math.cos(rotY),sy=Math.sin(rotY);
  const x2=x*cy+z*sy,z2=-x*sy+z*cy;
  const fov=650,s=fov/(fov+z2+200);
  return{x:W/2+x2*s,y:H/2+y*s,z:z2,s};
}

function addShock(col){shockwaves.push({r:0,alpha:0.9,col:col||'#00e5ff'});}

function drawGlobe(el){
  const prog=Math.min(1,el/3800);
  rotY+=0.003;
  const latL=12,lonL=18;
  for(let i=0;i<=latL;i++){
    const lat=(-Math.PI/2)+(Math.PI*i/latL);
    ctx.beginPath();let first=true;
    for(let j=0;j<=60;j++){
      const lon=(Math.PI*2*j/60);
      const x=globeR*Math.cos(lat)*Math.cos(lon+rotY);
      const y=globeR*Math.sin(lat);
      const z=globeR*Math.cos(lat)*Math.sin(lon+rotY);
      const p=proj(x,y,z);
      if(p.z<-globeR*0.1){first=true;continue;}
      if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`rgba(0,180,255,${0.06*prog})`;ctx.lineWidth=0.4;ctx.stroke();
  }
  for(let i=0;i<lonL;i++){
    const lon=(Math.PI*2*i/lonL);
    ctx.beginPath();let first=true;
    for(let j=0;j<=40;j++){
      const lat=(-Math.PI/2)+(Math.PI*j/40);
      const x=globeR*Math.cos(lat)*Math.cos(lon+rotY);
      const y=globeR*Math.sin(lat);
      const z=globeR*Math.cos(lat)*Math.sin(lon+rotY);
      const p=proj(x,y,z);
      if(p.z<-globeR*0.1){first=true;continue;}
      if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`rgba(0,180,255,${0.04*prog})`;ctx.lineWidth=0.3;ctx.stroke();
  }
  ctx.beginPath();ctx.arc(W/2,H/2,globeR,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,220,255,${0.25*prog})`;ctx.lineWidth=1.3;ctx.stroke();
  const sec=t/1000;
  const cr=7+3*Math.sin(sec*1.4);
  ctx.beginPath();ctx.arc(W/2,H/2,cr,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,200,255,${0.8*prog})`;ctx.fill();
  ctx.beginPath();ctx.arc(W/2,H/2,cr*0.45,0,Math.PI*2);
  ctx.fillStyle=`rgba(220,245,255,${prog})`;ctx.fill();
  globePts.forEach(p=>{
    if(el<p.delay)return;
    p.alpha=Math.min(p.target,(el-p.delay)/700*p.target);
    const x=p.ox*Math.cos(rotY)+p.oz*Math.sin(rotY);
    const z=-p.ox*Math.sin(rotY)+p.oz*Math.cos(rotY);
    const pr=proj(x,p.oy,z);
    if(pr.z<-globeR*0.3)return;
    const b=0.7+0.3*Math.sin(sec*p.spd+p.phase);
    ctx.beginPath();ctx.arc(pr.x,pr.y,p.sz*Math.max(0.4,pr.s),0,Math.PI*2);
    ctx.fillStyle=`rgba(0,210,255,${p.alpha*b})`;ctx.fill();
  });
  fieldPts.forEach(p=>{
    if(el<p.delay)return;
    p.alpha=Math.min(p.target,(el-p.delay)/600*p.target);
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0||p.x>W)p.vx*=-1;
    if(p.y<0||p.y>H)p.vy*=-1;
    const b=0.6+0.4*Math.sin(sec+p.phase);
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,180,255,${p.alpha*b})`;ctx.fill();
  });
}

function drawShockwaves(){
  for(let i=shockwaves.length-1;i>=0;i--){
    const s=shockwaves[i];
    s.r+=9;s.alpha-=0.02;
    if(s.alpha<=0){shockwaves.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(W/2,H/2,s.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,229,255,${s.alpha})`;ctx.lineWidth=2;ctx.stroke();
    if(s.r>60){
      ctx.beginPath();ctx.arc(W/2,H/2,s.r*0.65,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,229,255,${s.alpha*0.3})`;ctx.lineWidth=0.8;ctx.stroke();
    }
  }
}

function showTitle(){
  if(titleShown)return;titleShown=true;
  document.getElementById('title-wrap').style.opacity='1';
  setTimeout(()=>{const l1=document.getElementById('l1');l1.style.opacity='1';l1.style.transform='translateY(0)';},50);
  setTimeout(()=>{const l2=document.getElementById('l2');l2.style.opacity='1';l2.style.transform='translateY(0)';},320);
  setTimeout(()=>{const l3=document.getElementById('l3');l3.style.opacity='1';l3.style.transform='translateY(0)';},590);
  setTimeout(()=>{document.getElementById('divider').style.width='320px';},950);
  setTimeout(()=>{document.getElementById('sub').style.opacity='1';},1200);
  setTimeout(()=>{document.getElementById('sub2').style.opacity='1';},1500);
  setTimeout(()=>{document.getElementById('version').style.opacity='1';},1700);
  setTimeout(()=>{document.getElementById('enter-btn').style.opacity='1';},2100);
}

function buildShatter(){
  shatterPts=[];
  const cols=22,rows=16;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    shatterPts.push({
      x:c*(W/cols),y:r*(H/rows),w:W/cols,h:H/rows,
      vx:(Math.random()-0.5)*22,vy:(Math.random()-0.5)*16-4,
      rot:0,rotSpd:(Math.random()-0.5)*0.25,
      alpha:1,delay:Math.random()*250,
    });
  }
}

function drawShatter(st){
  const el2=st;
  shatterPts.forEach(p=>{
    if(el2<p.delay)return;
    const dt=(el2-p.delay)/16;
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.5;p.rot+=p.rotSpd;p.alpha-=0.025;
    if(p.alpha<=0)return;
    ctx.save();ctx.globalAlpha=Math.max(0,p.alpha);
    ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);
    ctx.fillStyle='rgba(0,4,14,0.92)';ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.strokeStyle=`rgba(0,229,255,${p.alpha*0.5})`;ctx.lineWidth=0.5;ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();ctx.globalAlpha=1;
  });
}

window.enterSystem=function(){
  buildShatter();shattering=true;shatterT=performance.now();
  document.getElementById('enter-btn').style.opacity='0';
  document.getElementById('title-wrap').style.opacity='0';
  document.getElementById('version').style.opacity='0';
  addShock('#b070ff');setTimeout(()=>addShock('#00e5ff'),200);
  setTimeout(()=>{window.location.href='dashboard.html';},1800);
};

let shatterStart=null;
function frame(ts){
  if(!startT)startT=ts;
  t=ts;
  const el=ts-startT;
  ctx.fillStyle='rgba(0,0,4,0.88)';ctx.fillRect(0,0,W,H);
  const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.min(W,H)*0.7);
  grad.addColorStop(0,'rgba(0,20,50,0.5)');grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  drawGlobe(el);
  drawShockwaves();
  if(el>3400&&!titleShown){addShock();setTimeout(()=>addShock('#b070ff'),300);showTitle();}
  if(shattering&&shatterT){drawShatter(ts-shatterT);}
  scanY=(scanY+0.9)%H;
  document.getElementById('scanline').style.top=scanY+'px';
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
