<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Allen Capital Ventures // PULSE X</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#000000;overflow:hidden;font-family:'Courier New',monospace;}
#c{position:absolute;inset:0;width:100%;height:100%;}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;}
#main-title{text-align:center;opacity:0;}
#line1{font-size:clamp(28px,6vw,72px);font-weight:bold;letter-spacing:0.15em;color:#ffffff;display:block;opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
#line2{font-size:clamp(28px,6vw,72px);font-weight:bold;letter-spacing:0.15em;color:#00e5ff;display:block;opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
#line3{font-size:clamp(28px,6vw,72px);font-weight:bold;letter-spacing:0.15em;color:#ffffff;display:block;opacity:0;transform:translateY(20px);transition:opacity 0.6s,transform 0.6s;}
#sub{font-size:clamp(10px,1.8vw,18px);letter-spacing:0.3em;color:rgba(0,229,255,0.6);margin-top:20px;opacity:0;transition:opacity 0.8s;}
#divider{width:0;height:1px;background:linear-gradient(90deg,transparent,#00e5ff,transparent);margin:16px auto;transition:width 1s;}
#enter-btn{
  position:absolute;bottom:80px;left:50%;transform:translateX(-50%);
  opacity:0;transition:opacity 0.6s;
  background:transparent;border:0.5px solid rgba(0,229,255,0.4);
  color:#00e5ff;font-family:'Courier New',monospace;
  font-size:11px;letter-spacing:3px;padding:12px 40px;
  cursor:pointer;pointer-events:all;
  transition:all 0.3s;
}
#enter-btn:hover{background:rgba(0,229,255,0.1);border-color:#00e5ff;box-shadow:0 0 20px rgba(0,229,255,0.2);}
#scanline{position:absolute;left:0;right:0;height:1px;background:rgba(0,229,255,0.08);pointer-events:none;}
#version{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:rgba(0,229,255,0.2);opacity:0;transition:opacity 0.6s;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div id="main-title">
    <span id="line1">ALLEN</span>
    <span id="line2">CAPITAL</span>
    <span id="line3">VENTURES</span>
    <div id="divider"></div>
    <div id="sub">GLOBAL INTELLIGENCE OPERATING SYSTEM</div>
  </div>
</div>
<button id="enter-btn" onclick="enter()">ENTER SYSTEM</button>
<div id="scanline"></div>
<div id="version">PULSE X // v4.0 // ALLEN OS</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,nowT=0,phase=0;
let particles=[],globePts=[],shockwaves=[];
let globeBuilt=false,globeProgress=0,titleShown=false,btnShown=false;
let scanY=0;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// Build globe points
function buildGlobe(){
  globePts=[];
  const R=Math.min(W,H)*0.22;
  const lat=18,lon=30;
  for(let i=0;i<=lat;i++){
    const phi=Math.PI*i/lat;
    for(let j=0;j<=lon;j++){
      const theta=Math.PI*2*j/lon;
      globePts.push({
        ox:R*Math.sin(phi)*Math.cos(theta),
        oy:R*Math.cos(phi),
        oz:R*Math.sin(phi)*Math.sin(theta),
        alpha:0,targetAlpha:Math.random()*0.6+0.3,
        delay:Math.random()*3000,
        size:Math.random()*1.5+0.5,
        phase:Math.random()*Math.PI*2,
      });
    }
  }
  // Extra random particles in field
  for(let i=0;i<200;i++){
    const R2=Math.min(W,H)*(0.25+Math.random()*0.4);
    const phi=Math.acos(2*Math.random()-1);
    const theta=Math.random()*Math.PI*2;
    particles.push({
      x:W/2+R2*Math.sin(phi)*Math.cos(theta),
      y:H/2+R2*Math.cos(phi),
      vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,
      size:Math.random()*1.2+0.2,
      alpha:0,targetAlpha:Math.random()*0.4+0.1,
      delay:Math.random()*4000,phase:Math.random()*Math.PI*2,
    });
  }
}
buildGlobe();

let rotY=0,rotSpeed=0.004;
function project(x,y,z){
  const cosY=Math.cos(rotY),sinY=Math.sin(rotY);
  const x2=x*cosY+z*sinY,z2=-x*sinY+z*cosY;
  const fov=600,scale=fov/(fov+z2+200);
  return{x:W/2+x2*scale,y:H/2+y2*scale,z:z2,scale};
}

function addShockwave(){
  shockwaves.push({r:0,maxR:Math.max(W,H)*0.8,alpha:0.8,col:'#00e5ff'});
}

function drawGlobe(elapsed){
  globeProgress=Math.min(1,elapsed/3500);
  rotY+=rotSpeed;
  const R=Math.min(W,H)*0.22;
  // Draw lat/lon lines
  const latLines=10,lonLines=16;
  for(let i=0;i<=latLines;i++){
    const phi=Math.PI*i/latLines;
    ctx.beginPath();let first=true;
    for(let j=0;j<=60;j++){
      const theta=Math.PI*2*j/60;
      const x=R*Math.sin(phi)*Math.cos(theta+rotY);
      const y=R*Math.cos(phi);
      const z=R*Math.sin(phi)*Math.sin(theta+rotY);
      const p=project(x,y,z);
      if(p.z<-R*0.2){first=true;continue;}
      const a=(p.z+R)/(R*2)*0.08*globeProgress;
      if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`rgba(0,180,255,${0.06*globeProgress})`;ctx.lineWidth=0.4;ctx.stroke();
  }
  for(let i=0;i<lonLines;i++){
    const theta=Math.PI*2*i/lonLines;
    ctx.beginPath();let first=true;
    for(let j=0;j<=40;j++){
      const phi=Math.PI*j/40;
      const x=R*Math.sin(phi)*Math.cos(theta+rotY);
      const y=R*Math.cos(phi);
      const z=R*Math.sin(phi)*Math.sin(theta+rotY);
      const p=project(x,y,z);
      if(p.z<-R*0.2){first=true;continue;}
      if(first){ctx.moveTo(p.x,p.y);first=false;}else ctx.lineTo(p.x,p.y);
    }
    ctx.strokeStyle=`rgba(0,180,255,${0.04*globeProgress})`;ctx.lineWidth=0.3;ctx.stroke();
  }
  // Outer ring
  ctx.beginPath();ctx.arc(W/2,H/2,R,0,Math.PI*2);
  ctx.strokeStyle=`rgba(0,220,255,${0.3*globeProgress})`;ctx.lineWidth=1.2;ctx.stroke();
  // Globe particles
  const t=nowT/1000;
  globePts.forEach(p=>{
    if(elapsed<p.delay)return;
    p.alpha=Math.min(p.targetAlpha,(elapsed-p.delay)/800*p.targetAlpha);
    const x=p.ox*Math.cos(rotY)+p.oz*Math.sin(rotY);
    const z=-p.ox*Math.sin(rotY)+p.oz*Math.cos(rotY);
    const pr=project(x,p.oy,z);
    if(pr.z<-R*0.3)return;
    const breathe=0.7+0.3*Math.sin(t*1.2+p.phase);
    ctx.beginPath();ctx.arc(pr.x,pr.y,p.size*Math.max(0.4,pr.scale),0,Math.PI*2);
    ctx.fillStyle=`rgba(0,210,255,${p.alpha*breathe})`;ctx.fill();
  });
  // Core glow
  const coreA=globeProgress;
  const coreR=6+3*Math.sin(t*1.5);
  const grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,R*0.8);
  grad.addColorStop(0,`rgba(0,60,120,${0.15*coreA})`);
  grad.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
  ctx.beginPath();ctx.arc(W/2,H/2,coreR,0,Math.PI*2);
  ctx.fillStyle=`rgba(0,200,255,${0.8*coreA})`;ctx.fill();
  ctx.beginPath();ctx.arc(W/2,H/2,coreR*0.5,0,Math.PI*2);
  ctx.fillStyle=`rgba(200,240,255,${coreA})`;ctx.fill();
}

function drawParticles(elapsed){
  const t=nowT/1000;
  particles.forEach(p=>{
    if(elapsed<p.delay)return;
    p.alpha=Math.min(p.targetAlpha,(elapsed-p.delay)/600*p.targetAlpha);
    p.x+=p.vx;p.y+=p.vy;
    const breathe=0.6+0.4*Math.sin(t+p.phase);
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`rgba(0,180,255,${p.alpha*breathe})`;ctx.fill();
  });
}

function drawShockwaves(){
  for(let i=shockwaves.length-1;i>=0;i--){
    const sw=shockwaves[i];
    sw.r+=8;sw.alpha-=0.018;
    if(sw.alpha<=0){shockwaves.splice(i,1);continue;}
    ctx.beginPath();ctx.arc(W/2,H/2,sw.r,0,Math.PI*2);
    ctx.strokeStyle=`rgba(0,229,255,${sw.alpha})`;ctx.lineWidth=2;ctx.stroke();
    if(sw.r>50){
      ctx.beginPath();ctx.arc(W/2,H/2,sw.r*0.7,0,Math.PI*2);
      ctx.strokeStyle=`rgba(0,229,255,${sw.alpha*0.4})`;ctx.lineWidth=0.8;ctx.stroke();
    }
  }
}

// Shattering effect
let shatterPieces=[];
let shattering=false,shatterDone=false;

function buildShatter(){
  shatterPieces=[];
  const cols=20,rows=14;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      shatterPieces.push({
        x:c*(W/cols),y:r*(H/rows),
        w:W/cols,h:H/rows,
        vx:(Math.random()-0.5)*18,
        vy:(Math.random()-0.5)*14-3,
        rot:0,rotSpeed:(Math.random()-0.5)*0.2,
        alpha:1,
        delay:Math.random()*300,
      });
    }
  }
}

function drawShatter(elapsed){
  shatterPieces.forEach(p=>{
    if(elapsed<p.delay)return;
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.4;
    p.rot+=p.rotSpeed;p.alpha-=0.028;
    if(p.alpha<=0)return;
    ctx.save();ctx.globalAlpha=p.alpha;
    ctx.translate(p.x+p.w/2,p.y+p.h/2);ctx.rotate(p.rot);
    ctx.fillStyle='rgba(0,6,20,0.9)';
    ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.strokeStyle=`rgba(0,229,255,${p.alpha*0.6})`;ctx.lineWidth=0.5;
    ctx.strokeRect(-p.w/2,-p.h/2,p.w,p.h);
    ctx.restore();ctx.globalAlpha=1;
  });
}

let startTime=null,shatterStart=null,titleTime=null;

function showTitle(){
  document.getElementById('main-title').style.opacity='1';
  setTimeout(()=>{document.getElementById('line1').style.opacity='1';document.getElementById('line1').style.transform='translateY(0)';},0);
  setTimeout(()=>{document.getElementById('line2').style.opacity='1';document.getElementById('line2').style.transform='translateY(0)';},280);
  setTimeout(()=>{document.getElementById('line3').style.opacity='1';document.getElementById('line3').style.transform='translateY(0)';},560);
  setTimeout(()=>{document.getElementById('divider').style.width='300px';},900);
  setTimeout(()=>{document.getElementById('sub').style.opacity='1';},1200);
  setTimeout(()=>{document.getElementById('version').style.opacity='1';},1500);
  setTimeout(()=>{document.getElementById('enter-btn').style.opacity='1';btnShown=true;},2000);
}

function enter(){
  buildShatter();shattering=true;shatterStart=performance.now();
  document.getElementById('enter-btn').style.opacity='0';
  document.getElementById('main-title').style.opacity='0';
  document.getElementById('version').style.opacity='0';
  setTimeout(()=>{window.location.href='dashboard.html';},1800);
}
window.enter=enter;

// Scanline
function drawScanline(){
  scanY=(scanY+0.8)%(H);
  document.getElementById('scanline').style.top=scanY+'px';
}

function frame(ts){
  if(!startTime)startTime=ts;
  nowT=ts;
  const elapsed=ts-startTime;
  ctx.fillStyle='rgba(0,0,2,0.88)';ctx.fillRect(0,0,W,H);

  drawParticles(elapsed);
  drawGlobe(elapsed);
  drawShockwaves();

  if(elapsed>3200&&!titleShown){
    titleShown=true;addShockwave();
    setTimeout(()=>{addShockwave();},400);
    setTimeout(showTitle,600);
  }

  if(shattering&&shatterStart){
    drawShatter(ts-shatterStart);
  }

  drawScanline();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
